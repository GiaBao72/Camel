<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị đơn hàng Camel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="assets/css/module-css/admin-neumorphism.css" rel="stylesheet">
</head>
<body class="admin-body" data-admin-protected="true">
    <div class="admin-layout">
        <aside class="admin-sidebar neu-card" aria-label="Sidebar quản trị">
            <div>
                <div class="admin-logo">Quản trị Camel</div>
                <div class="admin-subtitle">Bảng điều khiển mô phỏng · Giao diện mềm</div>
            </div>
            <nav class="admin-nav" aria-label="Điều hướng admin">
                <a href="admin.html">Tổng quan</a>
                <a href="admin-products.html">Sản phẩm</a>
                <a class="active" href="admin-orders.html">Đơn hàng</a>
                <a href="admin-users.html">Người dùng</a>
                <a href="admin-settings.html">Cài đặt</a>
                <a href="index.html">Về website</a>
            </nav>
            <button id="adminLogoutBtn" class="admin-btn danger" type="button">Đăng xuất</button>
        </aside>

        <main class="admin-shell">
            <header class="admin-topbar neu-card">
                <h1>Quản lý đơn hàng</h1>
                <div class="admin-user">
                    <span>Đăng nhập:</span>
                    <strong id="adminSessionUser">Admin</strong>
                </div>
            </header>

            <section class="panel neu-card">
                <div class="panel-head">
                    <h2>Cập nhật trạng thái đơn</h2>
                    <button id="exportOrdersCsvBtn" class="admin-btn small" type="button">Xuất CSV</button>
                </div>
                <div class="filters two-col">
                    <input id="ordersSearchInput" type="text" placeholder="Tìm theo mã đơn hoặc tên khách...">
                    <select id="ordersStatusFilter">
                        <option value="all">Tất cả trạng thái</option>
                        <option value="pending">Chờ xác nhận</option>
                        <option value="shipping">Đang giao</option>
                        <option value="done">Hoàn tất</option>
                        <option value="cancelled">Đã hủy</option>
                    </select>
                </div>
                <div class="table-actions" style="margin-bottom:10px;">
                    <button class="admin-btn small warning" id="ordersMarkShippingBtn" type="button">Đánh dấu đang giao</button>
                    <button class="admin-btn small success" id="ordersMarkDoneBtn" type="button">Đánh dấu hoàn tất</button>
                </div>
                <div class="table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="ordersCheckAll" aria-label="Chọn tất cả đơn hàng"></th>
                                <th>Mã đơn</th>
                                <th>Khách hàng</th>
                                <th>Giá trị</th>
                                <th>Trạng thái</th>
                                <th>Ngày</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody"></tbody>
                    </table>
                </div>
                <div id="ordersTableMeta" class="admin-footer-note"></div>
            </section>
        </main>
    </div>

    <section id="orderDetailModal" class="modal-backdrop" aria-hidden="true">
        <article class="modal-card neu-card" role="dialog" aria-modal="true" aria-labelledby="orderDetailTitle">
            <div class="panel-head">
                <h2 id="orderDetailTitle">Chi tiết đơn hàng</h2>
                <button id="closeOrderModalBtn" class="admin-btn small danger" type="button">Đóng</button>
            </div>
            <div class="simple-list" id="orderDetailContent"></div>
        </article>
    </section>

    <script src="assets/js/admin-mock.js"></script>
</body>
</html>
