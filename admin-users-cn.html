<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camel 用户管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="assets/css/module-css/admin-neumorphism.css" rel="stylesheet">
</head>
<body class="admin-body" data-admin-protected="true">
    <div class="admin-layout">
        <aside class="admin-sidebar neu-card" aria-label="管理侧边栏">
            <div>
                <div class="admin-logo">Camel 管理后台</div>
                <div class="admin-subtitle">模拟管理面板 · 软 UI 风格</div>
            </div>
            <nav class="admin-nav" aria-label="后台导航">
                <a href="admin-cn.html">总览</a>
                <a href="admin-products-cn.html">商品</a>
                <a href="admin-orders-cn.html">订单</a>
                <a class="active" href="admin-users-cn.html">用户</a>
                <a href="admin-settings-cn.html">设置</a>
                <a href="admin-users.html">切换越南语后台</a>
                <a href="index-cn.html">返回网站</a>
            </nav>
            <button id="adminLogoutBtn" class="admin-btn danger" type="button">退出登录</button>
        </aside>

        <main class="admin-shell">
            <header class="admin-topbar neu-card">
                <h1>内部用户管理</h1>
                <div class="admin-user">
                    <span>当前登录：</span>
                    <strong id="adminSessionUser">Admin</strong>
                </div>
            </header>

            <section class="panel neu-card">
                <h2>新增内部账号</h2>
                <form id="userAddForm" novalidate>
                    <div class="form-grid">
                        <div class="field">
                            <label for="userId">用户编号</label>
                            <input id="userId" required>
                        </div>
                        <div class="field">
                            <label for="userName">姓名</label>
                            <input id="userName" required>
                        </div>
                        <div class="field">
                            <label for="userEmail">Email</label>
                            <input id="userEmail" type="email" required>
                        </div>
                        <div class="field">
                            <label for="userRole">角色</label>
                            <select id="userRole">
                                <option value="owner">系统拥有者</option>
                                <option value="manager">管理员</option>
                                <option value="staff">员工</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="field">
                            <label for="userStatus">状态</label>
                            <select id="userStatus">
                                <option value="active">启用</option>
                                <option value="inactive">停用</option>
                            </select>
                        </div>
                    </div>
                    <button class="admin-btn primary" type="submit">新增用户</button>
                    <div id="userFormNotice" class="admin-footer-note" aria-live="polite"></div>
                </form>
            </section>

            <section class="panel neu-card" style="margin-top:16px;">
                <h2>用户列表</h2>
                <div class="filters two-col">
                    <input id="usersSearchInput" type="text" placeholder="按姓名或邮箱搜索...">
                    <select id="usersStatusFilter">
                        <option value="all">全部状态</option>
                        <option value="active">启用</option>
                        <option value="inactive">停用</option>
                    </select>
                </div>
                <div class="table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>编号</th>
                                <th>名称</th>
                                <th>Email</th>
                                <th>角色</th>
                                <th>状态</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="assets/js/admin-mock-cn.js"></script>
</body>
</html>
