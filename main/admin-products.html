<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản trị sản phẩm Camel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="assets/css/module-css/admin-neumorphism.css" rel="stylesheet">
</head>
<body class="admin-body" data-admin-protected="true">
    <div class="admin-layout">
        <aside class="admin-sidebar neu-card" aria-label="Sidebar quản trị">
            <div>
                <div class="admin-logo">Quản trị Camel</div>
                <div class="admin-subtitle">Bảng điều khiển mô phỏng · Giao diện mềm</div>
            </div>
            <nav class="admin-nav" aria-label="Điều hướng admin">
                <a href="admin.html">Tổng quan</a>
                <a class="active" href="admin-products.html">Sản phẩm</a>
                <a href="admin-orders.html">Đơn hàng</a>
                <a href="admin-users.html">Người dùng</a>
                <a href="admin-settings.html">Cài đặt</a>
                <a href="index.html">Về website</a>
            </nav>
            <button id="adminLogoutBtn" class="admin-btn danger" type="button">Đăng xuất</button>
        </aside>

        <main class="admin-shell">
            <header class="admin-topbar neu-card">
                <h1>Quản lý sản phẩm</h1>
                <div class="admin-user">
                    <span>Đăng nhập:</span>
                    <strong id="adminSessionUser">Admin</strong>
                </div>
            </header>

            <section class="panel neu-card">
                <h2>Thêm sản phẩm mô phỏng</h2>
                <form id="productAddForm" novalidate>
                    <div class="form-grid">
                        <div class="field">
                            <label for="productId">Mã sản phẩm</label>
                            <input id="productId" required>
                        </div>
                        <div class="field">
                            <label for="productName">Tên sản phẩm</label>
                            <input id="productName" required>
                        </div>
                        <div class="field">
                            <label for="productCategory">Danh mục</label>
                            <input id="productCategory">
                        </div>
                        <div class="field">
                            <label for="productPrice">Giá</label>
                            <input id="productPrice" type="number" min="0">
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="field">
                            <label for="productStock">Tồn kho</label>
                            <input id="productStock" type="number" min="0">
                        </div>
                        <div class="field">
                            <label for="productStatus">Trạng thái</label>
                            <select id="productStatus">
                                <option value="active">Đang hoạt động</option>
                                <option value="inactive">Ngưng hoạt động</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="productImage">Ảnh sản phẩm (URL)</label>
                            <input id="productImage" type="url" placeholder="https://...">
                        </div>
                    </div>
                    <button class="admin-btn primary" type="submit">Thêm sản phẩm</button>
                    <div id="productFormNotice" class="admin-footer-note" aria-live="polite"></div>
                </form>
            </section>

            <section class="panel neu-card" style="margin-top:16px;">
                <h2>Danh sách sản phẩm</h2>
                <div class="filters triple">
                    <input id="productSearchInput" type="text" placeholder="Tìm theo mã hoặc tên...">
                    <select id="productStatusFilter">
                        <option value="all">Tất cả trạng thái</option>
                        <option value="active">Đang hoạt động</option>
                        <option value="inactive">Ngưng hoạt động</option>
                    </select>
                    <select id="productSortFilter">
                        <option value="latest">Mới nhất</option>
                        <option value="price_asc">Giá tăng dần</option>
                        <option value="price_desc">Giá giảm dần</option>
                        <option value="stock_asc">Tồn kho tăng dần</option>
                        <option value="stock_desc">Tồn kho giảm dần</option>
                    </select>
                </div>
                <div class="table-wrap">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Mã</th>
                                <th>Tên</th>
                                <th>Danh mục</th>
                                <th>Giá</th>
                                <th>Tồn kho</th>
                                <th>Trạng thái</th>
                                <th>Ảnh</th>
                                <th>Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody"></tbody>
                    </table>
                </div>
                <div class="helper-row">
                    <div class="admin-footer-note" id="productTableMeta"></div>
                    <div class="pagination">
                        <button class="admin-btn small" id="productPrevPageBtn" type="button">Trang trước</button>
                        <span id="productPageInfo" class="admin-footer-note">Trang 1/1</span>
                        <button class="admin-btn small" id="productNextPageBtn" type="button">Trang sau</button>
                    </div>
                </div>
            </section>

            <section class="panel neu-card" style="margin-top:16px;">
                <h2>Chỉnh sửa sản phẩm</h2>
                <form id="productEditForm" novalidate>
                    <div class="form-grid">
                        <div class="field">
                            <label for="editProductId">Mã sản phẩm</label>
                            <input id="editProductId" readonly>
                        </div>
                        <div class="field">
                            <label for="editProductName">Tên sản phẩm</label>
                            <input id="editProductName" required>
                        </div>
                        <div class="field">
                            <label for="editProductCategory">Danh mục</label>
                            <input id="editProductCategory">
                        </div>
                        <div class="field">
                            <label for="editProductPrice">Giá</label>
                            <input id="editProductPrice" type="number" min="0">
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="field">
                            <label for="editProductStock">Tồn kho</label>
                            <input id="editProductStock" type="number" min="0">
                        </div>
                        <div class="field">
                            <label for="editProductStatus">Trạng thái</label>
                            <select id="editProductStatus">
                                <option value="active">Đang hoạt động</option>
                                <option value="inactive">Ngưng hoạt động</option>
                            </select>
                        </div>
                        <div class="field">
                            <label for="editProductImage">Ảnh sản phẩm (URL)</label>
                            <input id="editProductImage" type="url" placeholder="https://...">
                        </div>
                    </div>
                    <div class="table-actions">
                        <button class="admin-btn success" type="submit">Lưu chỉnh sửa</button>
                        <button class="admin-btn warning" id="resetEditProductBtn" type="button">Đặt lại form</button>
                    </div>
                    <div id="productEditNotice" class="admin-footer-note" aria-live="polite"></div>
                </form>
            </section>
        </main>
    </div>

    <script src="assets/js/admin-mock.js"></script>
</body>
</html>
