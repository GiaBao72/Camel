<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Camel 管理控制台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="assets/css/module-css/admin-neumorphism.css" rel="stylesheet">
</head>
<body class="admin-body" data-admin-protected="true">
    <div class="admin-layout">
        <aside class="admin-sidebar neu-card" aria-label="管理侧边栏">
            <div>
                <div class="admin-logo">Camel 管理后台</div>
                <div class="admin-subtitle">模拟管理面板 · 软 UI 风格</div>
            </div>
            <nav class="admin-nav" aria-label="后台导航">
                <a class="active" href="admin-cn.html">总览</a>
                <a href="admin-products-cn.html">商品</a>
                <a href="admin-orders-cn.html">订单</a>
                <a href="admin-users-cn.html">用户</a>
                <a href="admin-settings-cn.html">设置</a>
                <a href="admin.html">切换越南语后台</a>
                <a href="index-cn.html">返回网站</a>
            </nav>
            <button id="adminLogoutBtn" class="admin-btn danger" type="button">退出登录</button>
        </aside>

        <main class="admin-shell">
            <header class="admin-topbar neu-card">
                <h1>运营总览</h1>
                <div class="admin-footer-note">数据模式：越中双语模拟数据</div>
                <div class="admin-user">
                    <span>当前登录：</span>
                    <strong id="adminSessionUser">Admin</strong>
                </div>
            </header>

            <section class="grid-stats" aria-label="快速统计">
                <article class="stat-card neu-card">
                    <div class="stat-label">商品</div>
                    <div class="stat-value" id="statProducts">0</div>
                    <div class="stat-note">实时模拟</div>
                </article>
                <article class="stat-card neu-card">
                    <div class="stat-label">订单</div>
                    <div class="stat-value" id="statOrders">0</div>
                    <div class="stat-note">存储于 localStorage</div>
                </article>
                <article class="stat-card neu-card">
                    <div class="stat-label">已完成营收</div>
                    <div class="stat-value" id="statRevenue">0</div>
                    <div class="stat-note">仅统计已完成订单</div>
                </article>
                <article class="stat-card neu-card">
                    <div class="stat-label">系统用户</div>
                    <div class="stat-value" id="statUsers">0</div>
                    <div class="stat-note">内部团队</div>
                </article>
            </section>

            <section class="admin-grid-2">
                <article class="panel neu-card">
                    <h2>最近订单</h2>
                    <div class="table-wrap">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>编号</th>
                                    <th>客户</th>
                                    <th>金额</th>
                                    <th>状态</th>
                                    <th>日期</th>
                                </tr>
                            </thead>
                            <tbody id="latestOrders"></tbody>
                        </table>
                    </div>
                </article>

                <article class="panel neu-card">
                    <h2>库存预警</h2>
                    <div id="stockAlerts" class="kpi-list" aria-live="polite"></div>
                    <div class="admin-footer-note">
                        提示：可前往商品页补货或调整显示状态。
                    </div>
                </article>
            </section>

            <section class="panel neu-card" style="margin-top:16px;">
                <div class="panel-head">
                    <h2>模拟营收</h2>
                    <div class="table-actions">
                        <select id="revenueRangeFilter" class="admin-select small">
                            <option value="7">7 天</option>
                            <option value="14">14 天</option>
                            <option value="30">30 天</option>
                        </select>
                        <button class="admin-btn small" id="regenRevenueBtn" type="button">重建数据</button>
                    </div>
                </div>
                <div class="chart-wrap">
                    <canvas id="revenueChart" width="900" height="240" aria-label="7天营收图表"></canvas>
                </div>
                <div class="admin-footer-note" id="revenueSummary"></div>
            </section>
        </main>
    </div>

    <script src="assets/js/admin-mock-cn.js"></script>
</body>
</html>
